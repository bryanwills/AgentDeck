[env:ulanzi_tc001]
platform = espressif32@^6.9.0
platform_packages =
	platformio/tool-esptoolpy @ file:///Users/puritysb/.platformio/packages/tool-esptoolpy
framework = arduino
board = esp32dev
upload_port = /dev/cu.usbserial-211110
monitor_port = /dev/cu.usbserial-211110
monitor_speed = 115200
board_build.partitions = partitions/ulanzi_tc001.csv
board_build.flash_size = 8MB
board_build.flash_mode = dio
build_src_filter =
	+<*>
	-<ui/display.*>
	-<ui/screens/*>
	-<ui/terrarium/*>
	-<ui/widgets/*>
	-<ui/fonts/*>
	-<ui/panel_st77916.h>
	-<audio/*>
	+<ui/matrix/*>
lib_deps =
	fastled/FastLED@^3.7.0
	links2004/WebSockets@^2.6.1
	bblanchon/ArduinoJson@^7.3.0
	tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_ULANZI_TC001
	-DSCREEN_W=32
	-DSCREEN_H=8
	-I src
