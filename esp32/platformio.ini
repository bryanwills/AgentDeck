[env:led8x32]
platform = espressif32
framework = arduino
board = esp32dev
upload_port = /dev/cu.wchusbserial211340
monitor_port = /dev/cu.wchusbserial211340
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = partitions/ulanzi_tc001.csv
board_build.flash_size = 8MB
board_build.flash_mode = dio
board_upload.flash_size = 8MB
build_src_filter =
	+<*>
	-<ui/display.*>
	-<ui/screens/*>
	-<ui/terrarium/*>
	-<ui/widgets/*>
	-<ui/fonts/*>
	-<ui/panel_st77916.h>
	-<ui/assets/*>
	-<audio/*>
	+<ui/matrix/*>
lib_deps =
	fastled/FastLED@^3.7.0
	links2004/WebSockets@^2.6.1
	bblanchon/ArduinoJson@^7.3.0
	tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_LED8X32
	-DSCREEN_W=32
	-DSCREEN_H=8
	-I src
	# NOTE: FastLED's legacy I2S driver (-DFASTLED_ESP32_I2S) was tried for WS2812
	# stability but on the classic ESP32 it drove a single strip on GPIO32 to a
	# garbage all-on/bright frame (it is a parallel-multi-strip driver). Reverted —
	# we keep the default RMT driver and instead remove the interrupt-contention
	# source via WiFi radio parking (see networkTask, BOARD_LED8X32 branch).

[env:inkdeck]
; InkDeck — Seeed TRMNL 7.5" OG DIY Kit: XIAO ESP32-S3 Plus (16MB flash /
; 8MB octal PSRAM) + GDEY075T7 800×480 1-bit e-ink (UC8179). Always
; USB-powered; connects to the daemon over WiFi WS (mDNS discovery) like
; every other board, with USB serial as the provisioning/identify path.
; Direct-draw GxEPD2 render tree (ui/eink/) — no LVGL, no matrix.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board = seeed_xiao_esp32s3
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
build_src_filter =
	+<*>
	-<ui/display.*>
	-<ui/screens/*>
	-<ui/terrarium/*>
	-<ui/widgets/*>
	-<ui/fonts/*>
	-<ui/panel_st77916.h>
	-<ui/assets/*>
	-<ui/matrix/*>
	-<audio/*>
	+<ui/eink/*>
lib_deps =
	zinggjm/GxEPD2@^1.6.4
	adafruit/Adafruit GFX Library@^1.11.9
	adafruit/Adafruit BusIO@^1.16.1
	links2004/WebSockets@^2.6.1
	bblanchon/ArduinoJson@^7.3.0
	tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_HAS_PSRAM
	-DBOARD_INKDECK
	-DSCREEN_W=800
	-DSCREEN_H=480
	-I src

# NOTE: There is no ESP32 "idotmatrix" board. The iDotMatrix 32x32 pixel display
# is a commercial Bluetooth-LE device (its controller is a BLE SoC, NOT an ESP32),
# so it cannot run this firmware. AgentDeck drives it over BLE — see the iDotMatrix
# integration (idotmatrix Python library, /pixoo/frame bridge endpoint), not here.
# A phantom [env:idotmatrix] + boards/board_idotmatrix_s3.h were removed 2026-06-13.

