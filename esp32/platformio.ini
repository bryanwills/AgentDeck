[env:esp32_c6_147]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board = esp32-c6-devkitc-1
upload_port = /dev/cu.usbmodem83201
monitor_port = /dev/cu.usbmodem83201
monitor_speed = 115200
board_build.f_cpu = 160000000L   ; ESP32-C6 max clock is 160MHz (base [env] sets 240MHz)
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
; ESP32-C6 has USB Serial/JTAG (HWCDC) only — no USB-OTG/TinyUSB. These must be set at
; the board layer (extra_flags) so the framework routes Serial to HWCDCSerial, not the
; nonexistent USBSerial. The stock esp32-c6-devkitc-1 board omits them; every working C6
; board JSON (adafruit/seeed/dfrobot) sets exactly these two.
board_build.extra_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
	+<*>
	-<ui/matrix/*>
lib_deps =
	lvgl/lvgl@^9.2.0
	lovyan03/LovyanGFX@^1.2.0
	links2004/WebSockets@^2.6.1
	bblanchon/ArduinoJson@^7.3.0
	tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_ESP32_C6_147
	-DSCREEN_W=172
	-DSCREEN_H=320
	-I src

