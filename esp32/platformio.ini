; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = box_86

[env]
platform = espressif32@^6.9.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.f_cpu = 240000000L
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-I src
lib_deps = 
	lvgl/lvgl@^9.2.0
	lovyan03/LovyanGFX@^1.2.0
	links2004/WebSockets@^2.6.1
	bblanchon/ArduinoJson@^7.3.0
	tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep

[env:ips_35]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbmodem2111101
monitor_port = /dev/cu.usbmodem2111101
monitor_speed = 115200
board_build.partitions = partitions/ips_35.csv
board_build.flash_size = 16MB
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_opi
lib_deps = 
	lvgl/lvgl@^9.2.0
	moononournation/GFX Library for Arduino@1.6.5
	links2004/WebSockets@^2.6.1
	bblanchon/ArduinoJson@^7.3.0
	tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-I src
	-DBOARD_IPS_35
	-DSCREEN_W=480
	-DSCREEN_H=320
	-DHAS_OTA=1
	-DHAS_FAT=1

[env:box_86]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbserial-21130
monitor_port = /dev/cu.usbserial-21130
board_build.partitions = partitions/box_86.csv
board_build.arduino.memory_type = qio_opi
build_flags =
	${env.build_flags}
	-DBOARD_BOX_86
	-DSCREEN_W=480
	-DSCREEN_H=480
	-DNO_OTA=1

[env:boot_test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbserial-21130
monitor_port = /dev/cu.usbserial-21130
board_build.partitions = partitions/box_86.csv
board_build.arduino.memory_type = qio_opi
build_src_filter = -<*> +<../test/main_minimal.cpp>
