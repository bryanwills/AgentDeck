; AgentDeck ESP32-S3 Touch Display Client
; PlatformIO multi-environment build

[platformio]
default_envs = box_86

[env]
platform = espressif32@^6.9.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.f_cpu = 240000000L
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src
lib_deps =
    lvgl/lvgl@^9.2.0
    lovyan03/LovyanGFX@^1.2.0
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.3.0
    tzapu/WiFiManager@^2.0.17
lib_ldf_mode = deep

; === 3.5" IPS 480x320 — JC3248W535 (AXS15231B QSPI) ===
; Flash: physical size TBD — use 8MB to be safe (firmware fits in 3MB app partition)
[env:ips_35]
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbmodem201301
monitor_port = /dev/cu.usbmodem201301
board_build.partitions = partitions/round_amoled.csv
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DBOARD_IPS_35
    -DSCREEN_W=480
    -DSCREEN_H=320
    -DHAS_OTA=1
    -DHAS_FAT=1

; === 86 Box 4" 480x480 — ESP32-S3-4848S040 (ST7701 RGB parallel) ===
[env:box_86]
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbserial-21130
monitor_port = /dev/cu.usbserial-21130
board_build.partitions = partitions/box_86.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DBOARD_BOX_86
    -DSCREEN_W=480
    -DSCREEN_H=480
    -DNO_OTA=1

; === Boot test — Serial only, no display/LVGL ===
[env:boot_test]
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbserial-21130
monitor_port = /dev/cu.usbserial-21130
board_build.partitions = partitions/box_86.csv
board_build.arduino.memory_type = qio_opi
build_src_filter = -<*> +<../test/main_minimal.cpp>
lib_deps =
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DBOARD_BOX_86
    -DSCREEN_W=480
    -DSCREEN_H=480

; === Display test — LovyanGFX only, no LVGL ===
[env:display_test]
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbserial-21130
monitor_port = /dev/cu.usbserial-21130
board_build.partitions = partitions/box_86.csv
board_build.arduino.memory_type = qio_opi
build_src_filter = -<*> +<../test/main_display_debug.cpp>
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DBOARD_BOX_86
    -DSCREEN_W=480
    -DSCREEN_H=480
    -I src

; === Round AMOLED 1.8" 360x360 — JC3636W518 (ST77916 QSPI) ===
; Native USB JTAG requires ARDUINO_USB_CDC_ON_BOOT=1 for Serial
; Flash: 16MB physical but boot-loops with 16MB setting — use 8MB (firmware fits fine)
; PSRAM: OPI 8MB
[env:round_amoled]
board = esp32-s3-devkitc-1
upload_port = /dev/cu.usbmodem211201
monitor_port = /dev/cu.usbmodem211201
board_build.partitions = partitions/round_amoled.csv
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_ROUND_AMOLED
    -DSCREEN_W=360
    -DSCREEN_H=360
    -DIS_ROUND=1
    -DHAS_OTA=1
