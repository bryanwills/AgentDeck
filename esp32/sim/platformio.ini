; AgentDeck ESP32 host simulator (native).
;
; Compiles the REAL firmware terrarium render sources against the host toolchain
; + LVGL's software renderer, into a headless RGB565 framebuffer that is dumped
; to PNG. Pixel-exact because it reuses the firmware sources verbatim with the
; target board's build defines — no reimplementation.
;
; This is a standalone PlatformIO project (NOT inheriting esp32/platformio.ini),
; so the ESP32 lib_deps (WiFi/WebSockets/LovyanGFX) never enter the native build.
; Firmware sources are pulled in via build_src_filter with ../.. relative paths.
;
;   pio run -e box_86                                  # build
;   .pio/build/box_86/program --all --outdir sim-out   # render all scenes
;
; Board envs differ only in the BOARD_* / SCREEN_* defines — the same sources
; compile for each, exactly as on-device.

[sim_base]
platform = native
build_type = release
lib_deps = lvgl/lvgl@^9.2.0
lib_ldf_mode = deep
; -I order matters: shims first so <Arduino.h>/<freertos/*>/<esp_heap_caps.h>
; resolve to the host stubs, then ../src for the firmware headers + lv_conf.h.
build_flags =
	-std=gnu++17
	-I ${PROJECT_DIR}/shims
	-I ${PROJECT_DIR}/../src
	-DLV_CONF_INCLUDE_SIMPLE
	-DSIM_HOST=1
; Compile only this project's src/ — the sim driver plus src/fw/*.cpp unity-include
; wrappers that pull in the firmware terrarium sources. Compiling them via src/
; (not an ../.. src_filter path) forces per-env object dirs so each board's #if
; branches (IS_ROUND, canvas format, MAX_*) take effect — a shared .pio/build/src/
; object would freeze them to whichever env built first. office.cpp is simply not
; wrapped (it's a separate IPS10 scene, not part of the core aquarium).
build_src_filter = +<*>

[env:box_86]
extends = sim_base
build_flags =
	${sim_base.build_flags}
	-DBOARD_BOX_86
	-DSCREEN_W=480
	-DSCREEN_H=480

[env:ips35]
extends = sim_base
build_flags =
	${sim_base.build_flags}
	-DBOARD_IPS35
	-DSCREEN_W=480
	-DSCREEN_H=320

[env:amoled]
extends = sim_base
build_flags =
	${sim_base.build_flags}
	-DBOARD_AMOLED
	-DIS_ROUND=1
	-DSCREEN_W=360
	-DSCREEN_H=360
