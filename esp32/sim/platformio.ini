; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[sim_base]
platform = native
build_type = release
lib_deps = lvgl/lvgl@^9.2.0
lib_ldf_mode = deep
build_flags = 
	-std=gnu++17
	-I ${PROJECT_DIR}/shims
	-I ${PROJECT_DIR}/../src
	-DLV_CONF_INCLUDE_SIMPLE
	-DSIM_HOST=1
	-DARDUINO=10819
build_src_filter = +<*> -<mtx/> -<eink/>

[env:box_86]
extends = sim_base
build_flags = 
	${sim_base.build_flags}
	-DBOARD_BOX_86
	-DSCREEN_W=480
	-DSCREEN_H=480

[env:ips35]
extends = sim_base
build_flags = 
	${sim_base.build_flags}
	-DBOARD_IPS35
	-DSCREEN_W=480
	-DSCREEN_H=320

[env:amoled]
extends = sim_base
build_flags = 
	${sim_base.build_flags}
	-DBOARD_AMOLED
	-DIS_ROUND=1
	-DSCREEN_W=360
	-DSCREEN_H=360

[env:ttgo]
extends = sim_base
build_flags = 
	${sim_base.build_flags}
	-DBOARD_TTGO
	-DSCREEN_W=135
	-DSCREEN_H=240

[env:ips10]
extends = sim_base
build_flags = 
	${sim_base.build_flags}
	-DBOARD_IPS10
	-DSCREEN_W=1280
	-DSCREEN_H=800

[env:led8x32]
extends = sim_base
build_src_filter = +<*> -<fw/> -<eink/> -<sim_display.cpp>
build_flags =
	${sim_base.build_flags}
	-DBOARD_LED8X32

; Seeed InkDeck 7.5" 800×480 1-bit e-ink (UC8179). Direct-draw GxEPD2 tree — the
; geometry/text come from the real vendored Adafruit_GFX; only drawPixel + the
; panel lifecycle are shimmed. No LVGL (sim_display.cpp excluded), no terrarium.
[env:inkdeck]
extends = sim_base
build_src_filter = +<*> -<fw/> -<mtx/> -<sim_display.cpp>
build_flags =
	${sim_base.build_flags}
	-I ${PROJECT_DIR}/vendor/adafruit_gfx
	-DBOARD_INKDECK
	-DSCREEN_W=800
	-DSCREEN_H=480
