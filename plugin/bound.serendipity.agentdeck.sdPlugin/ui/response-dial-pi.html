<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="sdpi-components.js"></script>
  <style>
    .sdpi-info {
      margin: 0 1em 0.5em;
      padding: 0.5em 0.75em;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      border-left: 2px solid #444;
    }
    .sdpi-info code {
      background: #333;
      padding: 1px 4px;
      border-radius: 3px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <sdpi-item label="Prompts (one per line)">
    <sdpi-textarea setting="commandList" placeholder="Review this code for issues&#10;Write tests for this&#10;Refactor for clarity&#10;/compact&#10;/clear"></sdpi-textarea>
  </sdpi-item>
  <div class="sdpi-info">
    Dial rotates through this list. Push sends the selected prompt.<br/>
    Mix prompt templates and slash commands. Example: <code>Review this code</code> <code>/compact</code>
  </div>
</body>
</html>
