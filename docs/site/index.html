  <title>AgentDeck — Design System</title>

  <style>
    :root { --tide-50:#f5f3ec; --tide-100:#ebe6d6; --ink-900:#0e1f1f; --ink-700:#1f4544; --kelp-700:#1f6157; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; color: var(--ink-900); background: var(--tide-50); font-family: "IBM Plex Sans", system-ui, sans-serif; }
    main { max-width: 560px; padding: 32px; background: var(--tide-100); border-radius: 14px; }
    p { color: var(--ink-700); }
    a { color: var(--kelp-700); font-weight: 600; }
  </style>
</head>

  <main><h1>Documentation has a new home.</h1><p>Canonical Markdown, rendered previews, metadata, tokens, assets, and agent handover now live in the AgentDeck Design System viewer.</p><a href="../design-system/">Open Design System</a></main>
