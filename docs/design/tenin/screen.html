<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AgentDeck 10" screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../design/tokens.css" />
<link rel="stylesheet" href="screen.css" />
<style>
  html, body { height: 100%; margin: 0; background: #07140f; overflow: hidden; }
  #app { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="app"></div>
<script src="creatures.js"></script>
<script src="data.js"></script>
<script src="terrarium.js"></script>
<script src="cells.js"></script>
<script src="mount.js"></script>
<script>
  const q = new URLSearchParams(location.search);
  AgentDeck.mount({
    root: '#app',
    variant: q.get('v') || 'bento',
    orient: q.get('o') || 'landscape',
    live: q.get('live') !== '0',
  });
</script>
</body>
</html>
