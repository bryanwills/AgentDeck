name: AgentDeck
options:
  bundleIdPrefix: bound.serendipity.agentdeck.dashboard
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.6"
    CURRENT_PROJECT_VERSION: 7
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AgentDeck_iOS:
    type: application
    platform: iOS
    sources:
      - path: AgentDeck
        excludes:
          - Resources/Info.plist
          - Resources/Info-macOS.plist
      - path: ../generated/protocol/AgentCommand.swift
        group: AgentDeck/Generated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard
        INFOPLIST_FILE: AgentDeck/Resources/Info.plist
        PRODUCT_NAME: AgentDeck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: R22679GY5Z
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: AgentDeck Dashboard AppStore

  AgentDeck_macOS:
    type: application
    platform: macOS
    sources:
      - path: AgentDeck
        excludes:
          - Resources/Info.plist
          - Resources/Info-macOS.plist
      - path: ../generated/protocol/AgentCommand.swift
        group: AgentDeck/Generated
      - path: ../generated/protocol/GatewayFrame.swift
        group: AgentDeck/Generated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard
        INFOPLIST_FILE: AgentDeck/Resources/Info-macOS.plist
        PRODUCT_NAME: AgentDeck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: R22679GY5Z
        # App Store invariant token. macOS is shipped as an App Store app
        # only; full-spec developer integrations live in the external Node
        # CLI/daemon. Do not use this as a distribution switch or reintroduce
        # subprocess/bundled-helper paths under another condition.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: AGENTDECK_APP_STORE
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: AgentDeck Dashboard macOS AppStore
    entitlements:
      path: AgentDeck/Resources/AgentDeck.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.serial: true
        com.apple.security.device.usb: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    postCompileScripts:
      - name: "App Store Helper Guard"
        script: |
          "${PROJECT_DIR}/scripts/copy-adb.sh"
        basedOnDependencyAnalysis: false

  AgentDeckTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AgentDeckTests
    dependencies:
      - target: AgentDeck_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard.tests

  AgentDeckTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AgentDeckTests
    dependencies:
      - target: AgentDeck_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgentDeck.app/Contents/MacOS/AgentDeck"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        # Match the host app's compile flag so tests evaluate the same
        # `#if AGENTDECK_APP_STORE` blocks. Without this the test target
        # would reference symbols the host compiled out (e.g. the
        # `.bundledBridge` launch mode fallback) and fail at link or run.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: AGENTDECK_APP_STORE

schemes:
  AgentDeck_iOS:
    build:
      targets:
        AgentDeck_iOS: all
        AgentDeckTests_iOS: [test]
    test:
      gatherCoverageData: true
      targets:
        - AgentDeckTests_iOS
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AgentDeck_macOS:
    build:
      targets:
        AgentDeck_macOS: all
        AgentDeckTests_macOS: [test]
    test:
      gatherCoverageData: true
      targets:
        - AgentDeckTests_macOS
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
