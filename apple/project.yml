name: AgentDeck
options:
  bundleIdPrefix: bound.serendipity.agent.deck
  deploymentTarget:
    iOS: "17.0"
    macOS: "26.0"
  xcodeVersion: "26.6"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: 2
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AgentDeck_iOS:
    type: application
    platform: iOS
    productName: AgentDeck
    sources:
      - path: AgentDeck
        excludes:
          - Resources/Info.plist
          - Resources/Info-macOS.plist
      - path: ../generated/protocol/AgentCommand.swift
        group: AgentDeck/Generated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agent.deck
        INFOPLIST_FILE: AgentDeck/Resources/Info.plist
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        PRODUCT_NAME: AgentDeck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: QF36NDHYHD
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
        release:
          # Cloud signing: CI archives with an App Store Connect API key
          # (-allowProvisioningUpdates -authenticationKey*), so certs and
          # App Store profiles are cloud-managed — no profile secrets.
          CODE_SIGN_STYLE: Automatic

  AgentDeck_macOS:
    type: application
    platform: macOS
    productName: AgentDeck
    sources:
      - path: AgentDeck
        excludes:
          - Resources/Info.plist
          - Resources/Info-macOS.plist
      - path: ../generated/protocol/AgentCommand.swift
        group: AgentDeck/Generated
      - path: ../generated/protocol/GatewayFrame.swift
        group: AgentDeck/Generated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agent.deck
        INFOPLIST_FILE: AgentDeck/Resources/Info-macOS.plist
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        PRODUCT_NAME: AgentDeck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: QF36NDHYHD
        # App Store invariant token. macOS is shipped as an App Store app
        # only; full-spec developer integrations live in the external Node
        # CLI/daemon. Do not use this as a distribution switch or reintroduce
        # subprocess/bundled-helper paths under another condition.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: AGENTDECK_APP_STORE
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
          # Setting the base condition above REPLACES Xcode's per-config
          # default, so a Debug macOS build had no `DEBUG` flag and every
          # `#if DEBUG` block compiled out — including the
          # `-AgentDeckScreenshotURL` launch pin the recording runbook
          # depends on. Re-add it for Debug only; Release keeps the App
          # Store token alone, so debug-only paths still never ship.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: AGENTDECK_APP_STORE DEBUG
        release:
          # Cloud signing — see the iOS release config note.
          CODE_SIGN_STYLE: Automatic
    entitlements:
      path: AgentDeck/Resources/AgentDeck.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.bluetooth: true
        com.apple.security.device.serial: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    postCompileScripts:
      - name: "App Store Helper Guard"
        script: |
          "${PROJECT_DIR}/scripts/copy-adb.sh"
        basedOnDependencyAnalysis: false

  AgentDeckTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AgentDeckTests
    dependencies:
      - target: AgentDeck_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agent.deck.tests
        DEVELOPMENT_TEAM: QF36NDHYHD
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgentDeck.app/AgentDeck"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  AgentDeckTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AgentDeckTests
    dependencies:
      - target: AgentDeck_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agent.deck.tests
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QF36NDHYHD
        PROVISIONING_PROFILE_SPECIFIER: ""
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgentDeck.app/Contents/MacOS/AgentDeck"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        # Match the host app's compile flag so tests evaluate the same
        # `#if AGENTDECK_APP_STORE` blocks. Without this the test target
        # would reference symbols the host compiled out (e.g. the
        # `.bundledBridge` launch mode fallback) and fail at link or run.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: AGENTDECK_APP_STORE
      configs:
        debug:
          # Keep in step with the host app's Debug conditions above.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: AGENTDECK_APP_STORE DEBUG

schemes:
  AgentDeck_iOS:
    build:
      targets:
        AgentDeck_iOS: all
        AgentDeckTests_iOS: [test]
    test:
      gatherCoverageData: true
      targets:
        - AgentDeckTests_iOS
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AgentDeck_macOS:
    build:
      targets:
        AgentDeck_macOS: all
        AgentDeckTests_macOS: [test]
    test:
      gatherCoverageData: true
      targets:
        - AgentDeckTests_macOS
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
