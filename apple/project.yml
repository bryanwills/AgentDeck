name: AgentDeck
options:
  bundleIdPrefix: bound.serendipity.agentdeck.dashboard
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  AgentDeck_iOS:
    type: application
    platform: iOS
    sources:
      - AgentDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard
        INFOPLIST_FILE: AgentDeck/Resources/Info.plist
        PRODUCT_NAME: AgentDeck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: R22679GY5Z
      configs:
        debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_STYLE: Automatic

  AgentDeck_macOS:
    type: application
    platform: macOS
    sources:
      - AgentDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard
        PRODUCT_NAME: AgentDeck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: R22679GY5Z
      configs:
        debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_STYLE: Automatic
    entitlements:
      path: AgentDeck/Resources/AgentDeck.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true

  AgentDeckTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AgentDeckTests
    dependencies:
      - target: AgentDeck_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard.tests

  AgentDeckTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AgentDeckTests
    dependencies:
      - target: AgentDeck_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bound.serendipity.agentdeck.dashboard.tests
