name: Apple Tests

on:
  push:
    branches: [master]
    paths:
      - 'apple/**'
      - 'shared/**'
      - 'generated/protocol/**'
      - 'docs/appstore-metadata-draft.md'
      - '.github/workflows/apple-test.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apple/**'
      - 'shared/**'
      - 'generated/protocol/**'
      - 'docs/appstore-metadata-draft.md'
      - '.github/workflows/apple-test.yml'

jobs:
  # Gates the App Store submission bundle (metadata field limits per locale,
  # screenshot/preview dimensions, privacy manifest, encryption declaration).
  # Without this the metadata draft can drift out of ASC's limits — or out of
  # the shape the validator parses — and only fail at submission time.
  validate-submission:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (App Preview probing)
        run: brew install ffmpeg

      - name: Validate App Store submission bundle
        run: bash apple/scripts/validate-appstore-submission.sh

  test-macos:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        working-directory: apple
        run: xcodegen generate

      - name: Build AgentDeck_macOS
        run: |
          xcodebuild build \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_macOS \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/AgentDeckDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions || exit 1

      - name: Run AgentDeckTests_macOS
        run: |
          xcodebuild test \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_macOS \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/AgentDeckDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath "$RUNNER_TEMP/AgentDeckTests.xcresult" \
            | xcbeautify --renderer github-actions || exit 1

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: AgentDeckTests-xcresult
          path: ${{ runner.temp }}/AgentDeckTests.xcresult

  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        working-directory: apple
        run: xcodegen generate

      - name: Build AgentDeck_iOS (unsigned)
        run: |
          xcodebuild build \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_iOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/AgentDeckDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions || exit 1
