name: ESP32 Release

on:
  push:
    tags:
      - 'esp32-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: true
      max-parallel: 1  # sequential — one board at a time to avoid resource conflicts
      matrix:
        board:
          - env: box_86
            name: "86 Box 4\" 480x480"
          - env: ips35
            name: "IPS 3.5\" 480x320"
          - env: amoled
            name: "Round AMOLED 1.8\" 360x360"
          - env: ips10
            name: "IPS 10.1\" 1280x800"
          - env: inkdeck
            name: "InkDeck 7.5\" e-ink 800x480"
          - env: ttgo
            name: "TTGO T-Display 240x135"
          - env: led8x32
            name: "Ulanzi TC001 32x8 LED matrix"

    steps:
      - uses: actions/checkout@v4

      - name: Verify release version
        run: |
          VERSION="${GITHUB_REF_NAME#esp32-v}"
          test "$VERSION" = "$(tr -d '\n' < VERSION)"
          node scripts/verify-version-sync.mjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.board.name }}
        run: |
          cd esp32
          pio run -e ${{ matrix.board.env }}

      - name: Collect firmware
        run: |
          mkdir -p dist
          ENV=${{ matrix.board.env }}
          cp esp32/.pio/build/$ENV/firmware.bin dist/agentdeck-$ENV.bin
          cp esp32/.pio/build/$ENV/partitions.bin dist/agentdeck-$ENV-partitions.bin
          # Bootloader may be in different locations
          if [ -f esp32/.pio/build/$ENV/bootloader.bin ]; then
            cp esp32/.pio/build/$ENV/bootloader.bin dist/agentdeck-$ENV-bootloader.bin
          fi
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board.env }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#esp32-v}" >> "$GITHUB_OUTPUT"

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true

      - name: List firmware files
        run: ls -la firmware/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgentDeck ESP32 v${{ steps.version.outputs.VERSION }}"
          body: |
            ## AgentDeck ESP32 v${{ steps.version.outputs.VERSION }}

            Firmware binaries for all supported boards.

            ### Boards
            | Board | File | Display |
            |-------|------|---------|
            | 86 Box | `agentdeck-box_86.bin` | 4" 480×480 ST7701 |
            | IPS 3.5" | `agentdeck-ips35.bin` | 3.5" 480×320 AXS15231B |
            | Round AMOLED | `agentdeck-amoled.bin` | 1.8" 360×360 ST77916 |
            | IPS 10.1" | `agentdeck-ips10.bin` | 10.1" 1280×800 JC8012P4A1C |
            | InkDeck | `agentdeck-inkdeck.bin` | 7.5" 800×480 e-ink UC8179 |
            | TTGO T-Display | `agentdeck-ttgo.bin` | 1.14" 240×135 ST7789 |

            ### Flash
            ```bash
            # USB flash (replace PORT and BOARD)
            cd esp32 && pio run -e BOARD -t upload
            # Or use esptool directly
            esptool.py --port PORT write_flash 0x10000 agentdeck-BOARD.bin
            ```
          files: firmware/*
