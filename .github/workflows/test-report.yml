name: GitHub Pages & Build Health

on:
  push:
    branches: [master]

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cache PlatformIO (sim)
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            esp32/sim/.pio
          key: pio-sim-${{ hashFiles('esp32/sim/platformio.ini') }}
          restore-keys: pio-sim-

      - name: Install PlatformIO (demo ESP32 frames)
        run: pip install platformio

      - name: Build creature-simulator demo
        run: pnpm run demo:build

      - name: Build design system viewer
        run: pnpm run design-system:build

      - name: Run Vitest with coverage
        id: vitest
        continue-on-error: true
        run: |
          mkdir -p coverage/test-report
          npx vitest run --reporter=json --reporter=default --outputFile=coverage/test-report/vitest.json --coverage
        env:
          COLORTERM: truecolor
          TZ: Asia/Seoul

      - name: Run Android tests
        id: android
        continue-on-error: true
        run: cd android && ./gradlew testDebugUnitTest

      - name: Fetch previous history
        run: |
          PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          curl -sf "${PAGES_URL}/reports/history.json" -o coverage/test-report/history.json || echo '[]' > coverage/test-report/history.json
        continue-on-error: true

      - name: Generate HTML report
        if: always()
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          report_dir = Path("coverage/test-report")
          report_dir.mkdir(parents=True, exist_ok=True)

          def normalize(status):
              return {"success": "pass", "failure": "fail", "cancelled": "error"}.get(status, "not-run")

          def suite(status, executed, note):
              return {"status": normalize(status), "executed": executed, "note": note}

          data = {
              "run_profile": "github-pages",
              "suites": {
                  "vitest": suite(os.environ["VITEST_OUTCOME"], True, "Coverage + JSON report"),
                  "android": suite(os.environ["ANDROID_OUTCOME"], True, "JUnit + Robolectric on ubuntu"),
                  "apple": suite("not-run", False, "Not executed in Pages workflow (requires macOS runner)"),
                  "robot": suite("not-run", False, "Physical hardware suite; not executed on GitHub-hosted runners"),
              },
          }
          (report_dir / "run-metadata.json").write_text(json.dumps(data, indent=2), encoding="utf-8")
          PY
          python3 scripts/generate-html-report.py
        env:
          VITEST_OUTCOME: ${{ steps.vitest.outcome }}
          ANDROID_OUTCOME: ${{ steps.android.outcome }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Assemble Pages site
        run: |
          mkdir -p _site/reports _site/demo _site/hardware _site/gallery _site/docs _site/design-system
          # Landing page at root
          cp scripts/pages-index.html _site/index.html
          cp docs/media/agentdeck-icon.png _site/icon.png
          # Public Devices catalog under /hardware/ (self-contained single file)
          cp docs/hardware/index.html _site/hardware/index.html
          # Real device photography/screenshots referenced by the catalog cards
          # (missing files degrade to the hatch placeholder via <img onerror>)
          mkdir -p _site/media
          cp docs/media/macos-dashboard.png _site/media/ 2>/dev/null || true
          cp assets/LenovoTab_screenshot.png _site/media/ 2>/dev/null || true
          cp docs/media/ipad-iphone-closeup.jpg _site/media/ 2>/dev/null || true
          cp docs/media/android-eink.png _site/media/ 2>/dev/null || true
          cp docs/media/tui-dashboard.png _site/media/ 2>/dev/null || true
          cp docs/media/d200h-session-buttons.jpg _site/media/ 2>/dev/null || true
          cp docs/media/esp32-displays.jpg _site/media/ 2>/dev/null || true
          # Backward-compatible /gallery/ redirect (gallery content now lives in Devices)
          cp docs/gallery/index.html _site/gallery/index.html
          # Documentation hub under /docs/
          cp docs/site/index.html _site/docs/index.html
          # Rendered Markdown, metadata, design tokens, and canonical assets
          cp -R dist/design-system/. _site/design-system/
          # Live demo under /demo/
          cp -R dist/demo/. _site/demo/
          # Test report under /reports/
          cp coverage/test-report/index.html _site/reports/index.html
          cp coverage/test-report/history.json _site/reports/history.json 2>/dev/null || true
          cp coverage/test-report/summary.json _site/reports/summary.json 2>/dev/null || true
          cp coverage/test-report/run-metadata.json _site/reports/run-metadata.json 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
