name: Test Report

on:
  push:
    branches: [master]

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Vitest with coverage
        run: |
          mkdir -p coverage/test-report
          npx vitest run --reporter=json --reporter=default --outputFile=coverage/test-report/vitest.json --coverage

      - name: Run Android tests
        run: cd android && ./gradlew testDebugUnitTest || true

      - name: Fetch previous history
        run: |
          PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          curl -sf "${PAGES_URL}/history.json" -o coverage/test-report/history.json || echo '[]' > coverage/test-report/history.json
        continue-on-error: true

      - name: Generate HTML report
        run: python3 scripts/generate-html-report.py
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage/test-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
