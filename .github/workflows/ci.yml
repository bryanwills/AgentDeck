name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Product version sync
        run: pnpm verify-version

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          COLORTERM: truecolor
          TZ: Asia/Seoul

      - name: Coverage check
        run: npx vitest run --coverage
        env:
          COLORTERM: truecolor
          TZ: Asia/Seoul

      - name: Preview mirror sync check
        run: node scripts/check-preview-mirror-sync.mjs

      - name: Protocol drift check
        run: |
          pnpm generate-protocol
          if ! git diff --quiet generated/protocol/; then
            echo "::error::Protocol artifacts under generated/protocol/ are out of sync with shared/src/*protocol.ts."
            echo "::error::Run 'pnpm generate-protocol' locally and commit the result."
            git diff generated/protocol/
            exit 1
          fi
