name: Apple Release (TestFlight)

on:
  push:
    tags:
      - 'apple-v*'

permissions:
  contents: write

jobs:
  # Fail before burning two 30-minute archive jobs (and before consuming a
  # build number) if the submission bundle itself is invalid.
  validate-submission:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (App Preview probing)
        run: brew install ffmpeg

      - name: Validate App Store submission bundle
        run: bash apple/scripts/validate-appstore-submission.sh

  build-ios:
    needs: validate-submission
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Verify release version
        run: |
          VERSION="${GITHUB_REF_NAME#apple-v}"
          test "$VERSION" = "$(tr -d '\n' < VERSION)"
          node scripts/verify-version-sync.mjs

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#apple-v}" >> "$GITHUB_OUTPUT"

      # Cloud signing: the ASC API key (App Manager+ role) lets xcodebuild
      # create/manage the distribution certificate and App Store profile in
      # the cloud — no p12 or provisioning-profile secrets on the runner.
      - name: Create App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      # CI owns the build number: ASC rejects re-uploading a (MARKETING_VERSION,
      # CURRENT_PROJECT_VERSION) pair it has already seen, so the value in
      # project.yml is only a local-build default.
      #
      # run_number alone is NOT enough: "Re-run jobs" keeps run_number and only
      # bumps run_attempt, so re-running a partially-failed release (iOS uploaded,
      # macOS archive failed) would re-upload iOS with an identical pair and altool
      # would reject it. run_number*100 + run_attempt is strictly monotonic across
      # both re-tags and re-runs.
      - name: Archive iOS
        run: |
          xcodebuild archive \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_iOS \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/AgentDeck_iOS.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            CURRENT_PROJECT_VERSION=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} )) \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=QF36NDHYHD \
            ENABLE_PREVIEWS=NO

      - name: Export iOS IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AgentDeck_iOS.xcarchive \
            -exportOptionsPlist apple/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export_ios \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Verify iOS App Store invariants (exported IPA)
        # Guards against bundled helpers (Apple 2.5.2), `home-relative-path`
        # entitlement exceptions, and stray embedded executables. Runs on the
        # EXPORTED app (distribution-signed) — the archive itself is signed
        # with a cloud development identity, which the verifier rightly
        # rejects, so verifying pre-export would always fail.
        run: |
          unzip -q $RUNNER_TEMP/export_ios/AgentDeck.ipa -d $RUNNER_TEMP/ipa_unpacked
          bash apple/scripts/verify-appstore-archive.sh \
            $RUNNER_TEMP/ipa_unpacked/Payload/AgentDeck.app

      - name: Upload iOS to TestFlight
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export_ios/AgentDeck.ipa \
            -t ios \
            --apiKey ${{ secrets.ASC_API_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/private_keys

  build-macos:
    needs: validate-submission
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Verify release version
        run: |
          VERSION="${GITHUB_REF_NAME#apple-v}"
          test "$VERSION" = "$(tr -d '\n' < VERSION)"
          node scripts/verify-version-sync.mjs

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#apple-v}" >> "$GITHUB_OUTPUT"

      # Cloud signing — see the iOS job note. The Mac Installer Distribution
      # certificate for the App Store .pkg is also cloud-managed.
      - name: Create App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Archive macOS
        run: |
          xcodebuild archive \
            -project apple/AgentDeck.xcodeproj \
            -scheme AgentDeck_macOS \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/AgentDeck_macOS.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            CURRENT_PROJECT_VERSION=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} )) \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=QF36NDHYHD

      - name: Export macOS pkg
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AgentDeck_macOS.xcarchive \
            -exportOptionsPlist apple/ExportOptions-macOS.plist \
            -exportPath $RUNNER_TEMP/export_macos \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Verify App Store invariants (exported pkg)
        # Fails the build if bundled Node/adb/bridge helpers, iOS-only plist
        # keys, home-relative-path entitlement, or subprocess path strings
        # somehow leaked into the .app. Apple Guideline 2.5.2 enforcement.
        # Runs on the EXPORTED app (distribution-signed) — the archive is
        # signed with a cloud development identity that the verifier rejects.
        run: |
          pkgutil --expand-full $RUNNER_TEMP/export_macos/AgentDeck.pkg $RUNNER_TEMP/pkg_expanded
          APP=$(find $RUNNER_TEMP/pkg_expanded -type d -name 'AgentDeck.app' | head -1)
          test -n "$APP"
          bash apple/scripts/verify-appstore-archive.sh "$APP"

      - name: Upload macOS to App Store Connect
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export_macos/AgentDeck.pkg \
            -t macos \
            --apiKey ${{ secrets.ASC_API_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/private_keys

  release:
    needs: [build-ios, build-macos]
    runs-on: ubuntu-latest
    steps:
      # github.ref_name is the full tag (apple-v1.0.0); strip the channel prefix
      # so the release reads "AgentDeck Apple v1.0.0", not "…vapple-v1.0.0".
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#apple-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgentDeck Apple v${{ steps.version.outputs.version }}"
          body: |
            ## AgentDeck Apple v${{ steps.version.outputs.version }}

            Universal dashboard app for monitoring coding agent sessions.

            ### Install via TestFlight
            1. Open **TestFlight** on your iPhone/iPad/Mac
            2. Accept the invite or check for available builds
            3. Install **AgentDeck Dashboard**
