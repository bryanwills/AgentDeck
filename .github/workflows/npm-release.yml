name: npm Release

on:
  push:
    tags:
      - 'npm-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify release version
        run: |
          VERSION="${GITHUB_REF_NAME#npm-v}"
          test "$VERSION" = "$(tr -d '\n' < VERSION)"
          node scripts/verify-version-sync.mjs

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#npm-v}" >> "$GITHUB_OUTPUT"

      # --- npm publish (optional) ---
      # No-op until the repo variable NPM_PUBLISH_ENABLED is set to 'true' and
      # the secret NPM_TOKEN holds a granular automation token (a 2FA-on-publish
      # token cannot be used unattended). Until then this track stays manual per
      # RELEASING.md and this workflow only records the GitHub Release.
      #
      # Publish order matters: bridge depends on hooks + shared via workspace:*,
      # which pnpm rewrites to the concrete version at pack time, so those two
      # must exist on the registry first.
      - name: Publish packages
        if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in shared hooks bridge setup; do
            echo "==> publishing @agentdeck/$pkg"
            pnpm --filter "@agentdeck/$pkg" publish --access public --no-git-checks
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgentDeck npm v${{ steps.version.outputs.VERSION }}"
          body: |
            ## AgentDeck npm v${{ steps.version.outputs.VERSION }}

            The CLI, daemon, and Claude Code / Codex / OpenCode hook installers.
            Optional — the macOS App Store app runs standalone without any of this.

            ### Install
            ```bash
            npx @agentdeck/setup
            ```

            ### Packages
            | Package | Purpose |
            |---|---|
            | `@agentdeck/setup` | One-command installer |
            | `@agentdeck/bridge` | `agentdeck` CLI — daemon hub + session bridge |
            | `@agentdeck/hooks` | Agent lifecycle hook installers |
            | `@agentdeck/shared` | Shared protocol types and layout engines |
