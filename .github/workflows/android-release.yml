name: Android Release

on:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify release version
        run: |
          VERSION="${GITHUB_REF_NAME#android-v}"
          node scripts/verify-release-version.mjs android "$VERSION"
          node scripts/verify-version-sync.mjs

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#android-v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: /tmp/release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify --print-certs "$APK"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/agentdeck-v${{ steps.version.outputs.VERSION }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AgentDeck Android v${{ steps.version.outputs.VERSION }}"
          body: |
            ## AgentDeck Android v${{ steps.version.outputs.VERSION }}

            E-ink dashboard app for monitoring Claude Code sessions.

            ### Install
            1. Download `agentdeck-v${{ steps.version.outputs.VERSION }}.apk` below
            2. Transfer to your Android device
            3. Open the APK to install (enable "Install from unknown sources" if prompted)
            4. Launch AgentDeck and scan the QR code from your bridge to pair
          files: dist/agentdeck-v${{ steps.version.outputs.VERSION }}.apk

      # --- Google Play (optional) ---
      # No-op until the repo variable ANDROID_PLAY_ENABLED is set to 'true'.
      # Requires secret PLAY_SERVICE_ACCOUNT_JSON (Play Console service-account key).
      - name: Build release AAB (Google Play)
        if: ${{ vars.ANDROID_PLAY_ENABLED == 'true' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: /tmp/release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Google Play (internal track)
        if: ${{ vars.ANDROID_PLAY_ENABLED == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.agentdeck
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release.jks
